name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Use fixed debug keystore (consistent signing across builds)
        run: |
          mkdir -p ~/.android
          cp keystore/ozerbend-debug.keystore ~/.android/debug.keystore

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Set versionCode
        run: sed -i "s/versionCode 1/versionCode $GITHUB_RUN_NUMBER/" android/app/build.gradle

      - name: Set versionCode and BILLING
        run: |
          sed -i "s/versionCode 1/versionCode $GITHUB_RUN_NUMBER/" android/app/build.gradle
          sed -i "s|</manifest>|    <uses-permission android:name=\"com.android.vending.BILLING\" />\n</manifest>|" android/app/src/main/AndroidManifest.xml
          echo "Done"

      - name: Generate app icons from logo
        run: npx capacitor-assets generate --android

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OZER_BEND_PRO_MASTER_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Configure release signing (Play Store)
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore_release
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/keystore_release/release.keystore
          {
            echo ""
            echo "android {"
            echo "    signingConfigs {"
            echo "        release {"
            echo "            storeFile file(System.getenv(\"RELEASE_KEYSTORE_PATH\") ?: \"keystore_release/release.keystore\")"
            echo "            storePassword System.getenv(\"RELEASE_KEYSTORE_PASSWORD\")"
            echo "            keyAlias System.getenv(\"RELEASE_KEY_ALIAS\")"
            echo "            keyPassword System.getenv(\"RELEASE_KEY_PASSWORD\")"
            echo "        }"
            echo "    }"
            echo "    buildTypes {"
            echo "        release {"
            echo "            signingConfig signingConfigs.release"
            echo "        }"
            echo "    }"
            echo "}"
          } >> android/app/build.gradle

      - name: Build Release AAB (Play Store)
        working-directory: android
        env:
          RELEASE_KEYSTORE_PATH: keystore_release/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload Release AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: OZER_BEND_PRO_RELEASE_AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
